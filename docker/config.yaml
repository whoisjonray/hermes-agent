# Hermes DoorGrow Scout - Model routing
# Anthropic (DoorGrow key) for interactive, Nous Hermes for cron/delegation
# Created: 2026-04-16

model:
  default: "claude-sonnet-4-6"
  provider: "anthropic"

compression:
  enabled: true
  threshold: 0.50
  target_ratio: 0.20
  protect_last_n: 20
  summary_model: "google/gemini-3-flash-preview"

delegation:
  max_iterations: 50
  default_toolsets: ["terminal", "file", "web"]
  model: "google/gemini-3-flash-preview"
  provider: "openrouter"

terminal:
  backend: "local"
  timeout: 300

memory:
  memory_enabled: true
  user_profile_enabled: true

approvals:
  mode: "off"

timezone: "America/Chicago"

session_reset:
  mode: "none"
