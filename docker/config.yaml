# Hermes TRESR Config - Cost-optimized model routing
# Winston can update this via /model --global and /config commands
# Entrypoint only copies this on FIRST BOOT - runtime changes persist on volume

model:
  default: "anthropic/claude-sonnet-4-6"
  provider: "openrouter"
  base_url: "https://openrouter.ai/api/v1"

compression:
  enabled: true
  threshold: 0.50
  target_ratio: 0.20
  protect_last_n: 20
  summary_model: "google/gemini-3-flash-preview"

delegation:
  max_iterations: 50
  default_toolsets: ["terminal", "file", "web"]
  model: "google/gemini-3-flash-preview"
  provider: "openrouter"

terminal:
  backend: "local"
  timeout: 180

memory:
  memory_enabled: true
  user_profile_enabled: true

approvals:
  mode: "off"

timezone: "America/Chicago"

session_reset:
  mode: "none"
